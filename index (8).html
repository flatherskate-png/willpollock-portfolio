<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0f1117;
      --white: #ffffff;
      --offwhite: #f7f9fc;
      --teal: #0d9488;
      --teal-light: #14b8a6;
      --blue: #1e40af;
      --blue-mid: #3b82f6;
      --muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--offwhite);
      color: var(--black);
      min-height: 100vh;
    }

    /* ── GATE ── */
    #gate {
      position: fixed; inset: 0;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #gate.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .gate-inner {
      text-align: center;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
    }

    .gate-logo {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--teal), var(--blue-mid));
      margin: 0 auto 1.75rem;
    }

    .gate-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--white);
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .gate-sub {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    #pw-input {
      display: block;
      width: 100%;
      background: #1e2230;
      border: 1px solid #2d3348;
      border-radius: 8px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      padding: 0.8rem 1rem;
      outline: none;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.2s;
      margin-bottom: 0.75rem;
    }
    #pw-input::placeholder { color: #3d4460; letter-spacing: 0.05em; }
    #pw-input:focus { border-color: var(--teal-light); }
    #pw-input.shake { animation: shake 0.35s ease; border-color: #ef4444; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      60% { transform: translateX(8px); }
      80% { transform: translateX(-4px); }
    }

    #pw-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, var(--teal), var(--blue-mid));
      border: none;
      border-radius: 8px;
      color: var(--white);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 0.8rem;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 0.75rem;
    }
    #pw-btn:hover { opacity: 0.9; }
    #pw-btn:active { transform: scale(0.98); }
    #pw-error { color: #f87171; font-size: 0.8rem; min-height: 1.2em; }

    /* ── PORTFOLIO ── */
    #portfolio { opacity: 0; transition: opacity 0.7s ease 0.1s; }
    #portfolio.visible { opacity: 1; }

    /* Header */
    header {
      background: var(--black);
      color: var(--white);
      padding: 3.5rem 5vw 3rem;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.5rem;
    }
    .header-left {}
    .header-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--teal-light);
      margin-bottom: 0.6rem;
    }
    .header-name {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }
    .header-name span { color: var(--teal-light); }
    .header-tagline {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #94a3b8;
      font-weight: 300;
    }
    .header-right {
      text-align: right;
    }
    .header-contact {
      font-size: 0.82rem;
      color: #64748b;
      line-height: 1.9;
    }
    .header-contact a { color: var(--teal-light); text-decoration: none; }
    .header-contact a:hover { text-decoration: underline; }

    /* Accent bar */
    .accent-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--teal), var(--blue-mid), transparent);
    }

    /* Main content */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 5vw 5rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .section-title {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    /* Grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
    }

    /* Card */
    .video-card {
      background: var(--white);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(13, 148, 136, 0.12), 0 4px 16px rgba(0,0,0,0.08);
    }

    .thumb-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #0f1117;
      overflow: hidden;
    }
    .thumb-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0.85;
      transition: opacity 0.3s, transform 0.4s ease;
    }
    .video-card:hover .thumb-wrap img { opacity: 1; transform: scale(1.04); }

    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      transition: transform 0.2s, background 0.2s;
    }
    .video-card:hover .play-circle { transform: scale(1.12); }
    .play-circle svg { margin-left: 3px; }

    /* Teal tag strip at top of card */
    .card-strip {
      height: 3px;
      background: linear-gradient(90deg, var(--teal), var(--blue-mid));
    }

    .card-body { padding: 1.25rem 1.35rem 1.5rem; }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }
    .card-tag {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--teal);
    }
    .card-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 0.4rem;
      letter-spacing: -0.01em;
    }
    .card-desc {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.65;
      font-weight: 400;
    }

    /* Modal */
    #modal {
      position: fixed; inset: 0;
      background: rgba(10,12,20,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      padding: 1.5rem;
    }
    #modal.open { opacity: 1; visibility: visible; }
    .modal-inner { width: 100%; max-width: 920px; position: relative; }
    .modal-close {
      position: absolute; top: -2.75rem; right: 0;
      background: none; border: none;
      color: #94a3b8;
      font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: color 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .modal-close:hover { color: white; }
    .video-embed { aspect-ratio: 16/9; width: 100%; background: black; border-radius: 8px; overflow: hidden; }
    .video-embed iframe { width: 100%; height: 100%; border: none; display: block; }

    footer {
      text-align: center;
      padding: 2rem 5vw;
      font-size: 0.75rem;
      color: #94a3b8;
      border-top: 1px solid var(--border);
      letter-spacing: 0.04em;
    }

    @media (max-width: 768px) {
      .video-grid { grid-template-columns: 1fr; gap: 1.25rem; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      .header-right { text-align: left; }
    }
    @media (min-width: 769px) and (max-width: 960px) {
      .video-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-logo"></div>
    <h1 class="gate-title">[ Name ] Portfolio</h1>
    <p class="gate-sub">Theater &amp; Performance</p>
    <input id="pw-input" type="password" placeholder="Enter password" autocomplete="off" />
    <button id="pw-btn">Enter</button>
    <p id="pw-error">&nbsp;</p>
  </div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio">

  <header>
    <div class="header-inner">
      <div class="header-left">
        <p class="header-eyebrow">Performance Portfolio</p>
        <h1 class="header-name">[ Your Name ]</h1>
        <p class="header-tagline">Actor &amp; Singer &nbsp;·&nbsp; [ Your High School ] &nbsp;·&nbsp; Class of 2025</p>
      </div>
      <div class="header-right">
        <div class="header-contact">
          <a href="mailto:you@email.com">you@email.com</a><br>
          [ Your City, State ]
        </div>
      </div>
    </div>
  </header>

  <div class="accent-bar"></div>

  <main>
    <div class="section-header">
      <span class="section-title">Selected Work</span>
      <div class="section-line"></div>
    </div>

    <div class="video-grid" id="video-grid"></div>
  </main>

  <footer>Private portfolio &mdash; please do not share this link.</footer>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-inner">
    <button class="modal-close" id="modal-close">&#x2715; Close</button>
    <div class="video-embed" id="video-embed"></div>
  </div>
</div>

<script>
var PASSWORD = "wp2025";

var VIDEOS = [
  {
    youtubeId: "Gr4UlAILuJ0",
    tag: "Musical Theater",
    title: "Opening \u2014 13",
    description: "Role: Evan Goldman. School production.",
    date: "January 2024"
  },
  {
    youtubeId: "bVhzIyxGTGQ",
    tag: "Musical Theater",
    title: "\u201cAgony\u201d \u2014 Into the Woods",
    description: "Performed with my twin as part of a Pop Idol competition.",
    date: "October 2024"
  },
  {
    youtubeId: "IQQgLtMFBgk",
    tag: "Musical Theater",
    title: "\u201cLove Thy Neighbor\u201d \u2014 The Prom",
    description: "Role: Trent.",
    date: "October 2023"
  }
];

// Gate
var gate = document.getElementById("gate");
var portfolio = document.getElementById("portfolio");
var pwInput = document.getElementById("pw-input");
var pwBtn = document.getElementById("pw-btn");
var pwError = document.getElementById("pw-error");

function tryUnlock() {
  if (pwInput.value === PASSWORD) {
    gate.classList.add("hidden");
    portfolio.classList.add("visible");
  } else {
    pwError.textContent = "Incorrect password \u2014 please try again.";
    pwInput.value = "";
    pwInput.classList.remove("shake");
    void pwInput.offsetWidth;
    pwInput.classList.add("shake");
    setTimeout(function() { pwInput.classList.remove("shake"); }, 400);
  }
}

pwBtn.onclick = tryUnlock;
pwInput.onkeydown = function(e) { if (e.key === "Enter") tryUnlock(); };

// Build grid
var grid = document.getElementById("video-grid");
for (var i = 0; i < VIDEOS.length; i++) {
  (function(v) {
    var card = document.createElement("div");
    card.className = "video-card";
    var thumb = "https://img.youtube.com/vi/" + v.youtubeId + "/maxresdefault.jpg";
    var fallback = "https://img.youtube.com/vi/" + v.youtubeId + "/hqdefault.jpg";
    card.innerHTML =
      '<div class="thumb-wrap">' +
        '<img src="' + thumb + '" onerror="this.src=\'' + fallback + '\'">' +
        '<div class="play-overlay"><div class="play-circle">' +
          '<svg width="16" height="19" viewBox="0 0 16 19" fill="none"><path d="M1 1.5L15 9.5L1 17.5V1.5Z" fill="#0f1117"/></svg>' +
        '</div></div>' +
      '</div>' +
      '<div class="card-strip"></div>' +
      '<div class="card-body">' +
        '<div class="card-meta">' +
          '<span class="card-tag">' + v.tag + '</span>' +
          '<span class="card-date">' + v.date + '</span>' +
        '</div>' +
        '<h2 class="card-title">' + v.title + '</h2>' +
        '<p class="card-desc">' + v.description + '</p>' +
      '</div>';
    card.onclick = function() { openModal(v.youtubeId); };
    grid.appendChild(card);
  })(VIDEOS[i]);
}

// Modal
var modal = document.getElementById("modal");
var embed = document.getElementById("video-embed");
var closeBtn = document.getElementById("modal-close");

function openModal(id) {
  embed.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>';
  modal.classList.add("open");
}
function closeModal() {
  modal.classList.remove("open");
  embed.innerHTML = "";
}
closeBtn.onclick = closeModal;
modal.onclick = function(e) { if (e.target === modal) closeModal(); };
document.onkeydown = function(e) { if (e.key === "Escape") closeModal(); };
</script>
</body>
</html>
